name: test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  forge-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0
      - name: Add swap space
        run: |
          sudo fallocate -l 8G /extraswap
          sudo chmod 600 /extraswap
          sudo mkswap /extraswap
          sudo swapon /extraswap
      - name: Install npm dependencies
        run: npm install
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run tests
        run: forge test --deny notes --fail-fast --summary --detailed --skip "*/script/**"
        env:
          FOUNDRY_PROFILE: ci
          RPC_ETHEREUM_MAINNET: ${{ secrets.RPC_ETHEREUM_MAINNET }}
      - name: Check contract sizes
        run: forge build --deny notes --sizes --skip "*/test/**" --skip "*/script/**" --skip SphinxUtils
